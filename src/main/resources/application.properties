spring.application.name=chatbot
spring.devtools.restart.enabled=false

spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Gemini configuration
app.gemini.key=${GEMINI_API_KEY:}
app.gemini.openai-url=${GEMINI_OPENAI_URL:https://generativelanguage.googleapis.com/v1beta/openai}
app.gemini.native-url=${GEMINI_NATIVE_URL:https://generativelanguage.googleapis.com/v1beta}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Keep Spring AI aligned if that starter is used elsewhere later.
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
security.jwt.secret=${JWT_SECRET:}
app.cookies.secure=${APP_COOKIES_SECURE:true}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Redis config
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}
spring.data.redis.repositories.enabled=false
app.cache.conversation-ttl-seconds=604800

logging.level.org.springframework=DEBUG

server.address=0.0.0.0