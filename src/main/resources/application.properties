spring.application.name=chatbot

spring.datasource.url=jdbc:postgresql://localhost:5432/chatbot
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# API Key (not really used in LM Studio, but keep it)
openai.api.key=${OPENAI_API_KEY:lm-studio}

# Base URL (THIS is what changes)
openai.base.url=http://127.0.0.1:1234/v1

# Model name (must match LM Studio)
openai.model=${OPENAI_MODEL:gpt-oss}

security.jwt.secret=${JWT_SECRET:change-this-jwt-secret-to-a-long-random-value}
app.cookies.secure=${APP_COOKIES_SECURE:false}
