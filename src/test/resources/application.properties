spring.datasource.url=jdbc:h2:mem:chatbot-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

security.jwt.secret=test-jwt-secret-that-is-at-least-32-chars
app.cookies.secure=false
app.cors.allowed-origin=http://localhost:5173
app.gemini.key=test-gemini-key
app.gemini.openai-url=https://generativelanguage.googleapis.com/v1beta/openai
app.gemini.native-url=https://generativelanguage.googleapis.com/v1beta
app.gemini.model=gemini-2.5-flash

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.ssl.enabled=false

logging.level.org.springframework=INFO
